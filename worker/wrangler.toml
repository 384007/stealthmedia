name = "stealthmedia-worker"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ── R2 Bucket binding ────────────────────────────────────────────────────────
[[r2_buckets]]
binding  = "MEDIA_BUCKET"
bucket_name = "stealthmedia-media"

# ── KV Namespace for task state ──────────────────────────────────────────────
[[kv_namespaces]]
binding    = "TASK_STATUS"
id         = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_YOUR_KV_PREVIEW_ID"

# ── Secrets (set via: wrangler secret put SECRET_NAME) ───────────────────────
# MODAL_API_KEY   — Modal.com API token
# MODAL_FUNC_URL  — Modal function webhook URL
#   e.g. https://your-org--stealthmedia-process-media.modal.run
# R2_ACCOUNT_ID   — Cloudflare account ID (for presigned URLs)
# R2_ACCESS_KEY   — R2 access key (S3-compat)
# R2_SECRET_KEY   — R2 secret key (S3-compat)
# R2_BUCKET_NAME  — bucket name (stealthmedia-media)
# R2_PUBLIC_DOMAIN— custom domain or workers.dev endpoint for presigned URLs

# ── Cron: purge files older than 24 h ───────────────────────────────────────
[triggers]
crons = ["0 * * * *"]   # every hour, worker checks for expired tasks

# ── Routes (Cloudflare Pages proxy) ─────────────────────────────────────────
# In Pages dashboard add a proxy rule: /api/* → this worker

[vars]
ENVIRONMENT = "production"
